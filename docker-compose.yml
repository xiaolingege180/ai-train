version: '3.8'

# 生产环境一键部署配置
# 使用方式:
# 1. 配置环境变量（可选）：复制 .env.example 为 .env 并填写 API Keys
# 2. 直接启动: ./start.sh（前端会自动构建）
#
# 支持的 AI 模型（需配置对应 API Key）：
# - OpenAI: gpt-3.5-turbo, gpt-4, gpt-4-turbo
# - Anthropic: claude-3-haiku, claude-3-sonnet, claude-3-opus
# - Moonshot (Kimi): moonshot-v1-8k, moonshot-v1-32k, moonshot-v1-128k
# - 通义千问: qwen-turbo, qwen-plus, qwen-max
# - 豆包: doubao-lite, doubao-pro

services:
  # PostgreSQL 数据库
  postgres:
    image: postgres:15-alpine
    container_name: ai-training-db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: ai_training
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5

  # Redis 缓存
  redis:
    image: redis:7-alpine
    container_name: ai-training-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data

  # 后端服务
  backend:
    build: ./backend
    container_name: ai-training-backend
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ai_training
      - REDIS_URL=redis://redis:6379/0
      - SECRET_KEY=your-secret-key-change-in-production
      - DEBUG=false
      # AI API Keys（从 .env 文件读取或在此配置）
      - OPENAI_API_KEY=${OPENAI_API_KEY:-}
      - OPENAI_API_BASE=${OPENAI_API_BASE:-https://api.openai.com/v1}
      - ANTHROPIC_API_KEY=${ANTHROPIC_API_KEY:-}
      - ANTHROPIC_API_BASE=${ANTHROPIC_API_BASE:-https://api.anthropic.com}
      - MOONSHOT_API_KEY=${MOONSHOT_API_KEY:-}
      - MOONSHOT_API_BASE=${MOONSHOT_API_BASE:-https://api.moonshot.cn/v1}
      - DASHSCOPE_API_KEY=${DASHSCOPE_API_KEY:-}
      - DASHSCOPE_API_BASE=${DASHSCOPE_API_BASE:-https://dashscope.aliyuncs.com/api/v1}
      - DOUBAO_API_KEY=${DOUBAO_API_KEY:-}
      - DOUBAO_API_BASE=${DOUBAO_API_BASE:-https://ark.cn-beijing.volces.com/api/v3}
    ports:
      - "8000:8000"
    volumes:
      - ./backend:/app
      - ./uploads:/app/uploads
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_started
      init-data:
        condition: service_completed_successfully
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload

  # 数据初始化服务
  init-data:
    build: ./backend
    container_name: ai-training-init-data
    environment:
      - DATABASE_URL=postgresql://postgres:postgres@postgres:5432/ai_training
    volumes:
      - ./backend:/app
    depends_on:
      postgres:
        condition: service_healthy
    command: ["/bin/bash", "/app/init-data.sh"]
    restart: "no"

  # 前端服务 - 生产模式（Nginx托管静态文件）
  frontend:
    image: nginx:alpine
    container_name: ai-training-frontend
    volumes:
      - ./frontend/dist:/usr/share/nginx/html:ro
      - ./nginx/nginx.prod.conf:/etc/nginx/conf.d/default.conf:ro
    expose:
      - "80"
    depends_on:
      - backend

  # Nginx 反向代理
  nginx:
    image: nginx:alpine
    container_name: ai-training-nginx
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/conf.d/default.conf:ro
    depends_on:
      - frontend
      - backend
    restart: always

volumes:
  postgres_data:
  redis_data:
